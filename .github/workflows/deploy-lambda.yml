name: Deploy Lambda

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "lambda/**"

permissions:
  id-token: write   # GitHub OIDC 토큰 발급에 필요
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    name: Package & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── OIDC 인증: Terraform이 생성한 GitHub Actions IAM Role 사용 ──
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies into package dir
        run: |
          pip install -r lambda/requirements.txt -t lambda/package/

      - name: Zip Lambda package
        run: |
          cp lambda/handler.py lambda/package/
          cd lambda/package
          zip -r ../../lambda.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda.zip

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}
