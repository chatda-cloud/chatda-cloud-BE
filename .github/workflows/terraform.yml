name: Terraform

# ─────────────────────────────────────────────────────────────
# 부트스트랩 (최초 1회만 로컬에서 실행):
#   cd infra
#   cp terraform.tfvars.example terraform.tfvars  # 값 수정
#   terraform init && terraform apply
#   # → 기존 GitHub OIDC provider를 재사용하고 IAM Role 생성됨
#   # → output의 github_actions_terraform_role_arn을
#   #   GitHub Secrets에 AWS_TERRAFORM_ROLE_ARN으로 등록
#   # → 이후 IAM Key(AWS_ACCESS_KEY_ID 등)를 Secrets에서 삭제
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - develop
      - main
      - feature/gitops-terraform
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write   # GitHub OIDC 토큰 발급에 필요
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── OIDC 인증: IAM Key 없이 임시 토큰으로 인증 ──
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Validate required secrets
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          AWS_TERRAFORM_ROLE_ARN: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
        run: |
          if [ -z "$TF_VAR_db_password" ]; then
            echo "GitHub Actions secret TF_VAR_DB_PASSWORD is empty or missing."
            exit 1
          fi
          if [ -z "$AWS_TERRAFORM_ROLE_ARN" ]; then
            echo "GitHub Actions secret AWS_TERRAFORM_ROLE_ARN is empty or missing."
            exit 1
          fi

      - name: Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_org: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_org: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_org: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}
        run: terraform destroy -auto-approve
